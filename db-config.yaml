apiVersion: v1
kind: ConfigMap
metadata:
  name: common-db-config
data:
  application.yaml: |-
    spring:
      datasource:
        url: jdbc:mysql://mysql:3306/testdb?useSSL=false&serverTimezone=UTC
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 10
          minimum-idle: 5
          connection-timeout: 30000