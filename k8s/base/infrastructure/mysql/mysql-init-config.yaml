apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
data:
    init.sh: |-
      #!/bin/bash
      # 使用环境变量自动完成初始化
      mysql -u root -p"$MYSQL_ROOT_PASSWORD" <<-EOSQL
        -- 1. 创建数据库
        CREATE DATABASE IF NOT EXISTS user_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
        CREATE DATABASE IF NOT EXISTS order_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

        -- 2. 创建用户并从环境变量读取密码
        CREATE USER IF NOT EXISTS 'user_user'@'%' IDENTIFIED BY '$USER_PWD';
        CREATE USER IF NOT EXISTS 'order_user'@'%' IDENTIFIED BY '$ORDER_PWD';

        -- 3. 授予权限
        GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, INDEX, ALTER ON user_db.* TO 'user_user'@'%';
        GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, INDEX, ALTER ON order_db.* TO 'order_user'@'%';

        FLUSH PRIVILEGES;
      EOSQL