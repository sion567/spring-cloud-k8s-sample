apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-namespace-traffic
  namespace: dev # 对应环境的命名空间
spec:
  podSelector: {} # 选中该命名空间下的所有 Pod
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {} # 只允许来自同一个命名空间内部的 Pod 访问
    # 如果有特定的外部入口（如 Ingress Controller），需要额外在这里放行