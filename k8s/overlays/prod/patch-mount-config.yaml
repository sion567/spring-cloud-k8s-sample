apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  template:
    spec:
      containers:
      - name: app
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: "prod"
        volumeMounts:
          - name: config-volume
            mountPath: /config # SpringBoot 默认会优先读取 /config/application.yaml
        args: ["--spring.config.location=classpath:/,file:/config/application-prod.yaml"]
      volumes:
        - name: config-volume
          configMap:
            name: app-config-prod