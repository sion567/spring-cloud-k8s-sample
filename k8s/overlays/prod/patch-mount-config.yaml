apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  template:
    spec:
      containers:
      - name: app
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: "prod"
        volumeMounts:
          - name: config-volume
            mountPath: /config  # <--- 这里定义了容器内的绝对路径
        args: ["--spring.config.import=optional:file:/config/application-prod.yaml"]
      volumes:
        - name: config-volume
          configMap:
            name: app-config-prod # 指向 kustomization 生成的 ConfigMap