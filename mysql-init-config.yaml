apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
data:
  init.sql: |-
    -- 1. 创建业务数据库
    CREATE DATABASE IF NOT EXISTS `user_db` CHARACTER SET utf8mb4;
    CREATE DATABASE IF NOT EXISTS `order_db` CHARACTER SET utf8mb4;

    -- 2. 创建专用用户并限制来源 IP（% 代表允许所有 Pod 访问）
    CREATE USER 'user_user'@'%' IDENTIFIED BY 'UserPass123!';
    CREATE USER 'order_user'@'%' IDENTIFIED BY 'OrderPass456!';

    -- 3. 授予最小权限 (DML权限，禁止删表/删库)
    GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, INDEX, ALTER ON `user_db`.* TO 'user_user'@'%';
    GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, INDEX, ALTER ON `order_db`.* TO 'order_user'@'%';

    FLUSH PRIVILEGES;