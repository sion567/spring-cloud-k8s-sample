management:
  endpoints:
    web:
      exposure:
        include: "*" # 生产环境建议只开启常用端点
  endpoint:
    health:
      show-details: always
spring:
  application:
    name: auth-service
  profiles:
    active: ${ENV:dev}
  boot:
    admin:
      client:
        url: http://admin-server:8080 # 指向 K8s 中的 admin-server Service