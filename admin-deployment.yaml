apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-server
  template:
    metadata:
      labels:
        app: admin-server
    spec:
      serviceAccountName: admin-server-sa # 关键：使用有权限的账号启动
      containers:
        - name: admin-server
          image: admin-server:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: admin-server
spec:
  type: NodePort
  selector:
    app: admin-server
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30088 # 固定一个端口方便 Windows 访问