apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-server
  template:
    metadata:
      labels:
        app: admin-server
    spec:
      serviceAccountName: admin-server-sa # 关键：使用有权限的账号启动
      containers:
        - name: admin-server
          image: admin-server:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx400m"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-server
  namespace: dev
spec:
  type: NodePort
  selector:
    app: admin-server
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888
      nodePort: 30088 # K8s 默认的 nodePort 范围是 30000-32767