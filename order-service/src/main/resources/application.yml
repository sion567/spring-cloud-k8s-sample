management:
  endpoints:
    web:
      exposure:
        include: "*" # 生产环境建议只开启常用端点
  endpoint:
    health:
      show-details: always
spring:
  profiles:
    active: ${ENV:dev}
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/testdata
  boot:
    admin:
      client:
        url: http://admin-server:8080
