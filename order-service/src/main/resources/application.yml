management:
  endpoints:
    web:
      exposure:
        include: "*" # 生产环境建议只开启常用端点
  endpoint:
    health:
      show-details: always
spring:
  profiles:
    active: ${ENV:dev}
  flyway:
    enabled: true
    # 這裡指定兩個路徑：
    # 1. db/migration (存放公共建表 SQL)
    # 2. db/testdata (存放僅限 dev 的數據 SQL)
    locations:
      - classpath:db/migration
      - classpath:db/testdata
  boot:
    admin:
      client:
        url: http://admin-server:8080
