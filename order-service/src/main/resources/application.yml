server:
  port: 8085
management:
  endpoints:
    web:
      exposure:
        include: "*" # 生产环境建议只开启常用端点
  endpoint:
    health:
      show-details: always
spring:
  profiles:
    active: ${ENV:dev}
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/testdata
  boot:
    admin:
      client:
        url: http://admin-server:8080
