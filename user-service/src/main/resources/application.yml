management:
  endpoints:
    web:
      exposure:
        include: "*" # 生产环境建议只开启常用端点
  endpoint:
    health:
      show-details: always
spring:
  application:
    name: user-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/testdata
  boot:
    admin:
      client:
        url: http://admin-server:8080
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8