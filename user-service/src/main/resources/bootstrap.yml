spring:
  application:
    name: user-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    kubernetes:
      config:
        enabled: false  # 如果是 true，说明它正试图从 K8s ConfigMap 读配置
        sources:
          - name: ${spring.application.name}
      reload:
        enabled: false  # 如果有这一行，说明它支持“动态”热更新配置

