server:
  port: 8081
spring:
  boot:
    admin:
      client:
        url: http://localhost:8888
        instance:
          service-base-url: http://localhost:8081
  cloud:
    kubernetes:
      config:
        enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:devdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: SA
    password: ''
    driver-class-name: org.h2.Driver
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          jdbc:
            time_zone: UTC
      hibernate:
        ddl-auto: validate
      flyway:
        baseline-on-migrate: true

logging:
  level:
    org.springframework.web.client.RestClient: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE