management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,loggers"
spring:
  cloud:
    kubernetes:
      config:
        enabled: true
  flyway:
    enabled: true
    # 核心：允许在飞快数据库上启动
    baseline-on-migrate: true
    # 设置基线版本
    baseline-version: 1
    # 禁止在正式環境執行「清空數據庫」等危險操作
    clean-disabled: true
    # 建議：如果校驗失敗（比如有人改了舊腳本），報錯停止，防止數據不一致
    validate-on-migrate: true
    locations: classpath:db/migration