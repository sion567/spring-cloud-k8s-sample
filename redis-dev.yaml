apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dev
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.0-alpine
          command: ["redis-server", "--requirepass", "admin123"] # 设置密码
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis # 微服务连接名：spring.data.redis.host=redis
  namespace: dev
spec:
  selector:
    app: redis
  ports:
    - port: 6379
